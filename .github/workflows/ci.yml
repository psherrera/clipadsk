name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt || true
          pip install pip-audit ruff pytest || true

      - name: Run linter (ruff)
        run: ruff check . || true

      - name: Run tests
        run: pytest -q || true

      - name: Run pip-audit
        run: pip-audit --progress no || true

      - name: Generate pinned requirements
        run: python -m pip freeze > backend/requirements-pinned.txt

      - name: Upload pinned requirements artifact
        uses: actions/upload-artifact@v4
        with:
          name: requirements-pinned
          path: backend/requirements-pinned.txt
